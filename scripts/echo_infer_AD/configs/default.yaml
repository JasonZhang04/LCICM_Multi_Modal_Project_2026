# =============================================================================
# Aortic Dilation Fine-Tuning Configuration — PanEcho v2
# =============================================================================

# --- Data Paths ---
data:
  jhu_echo_dir: "/data/rsteven1/echo_jhu_dataset"
  jhu_metadata_dir: "/data/rsteven1/echo_jhu_metadata"
  labels_cache: "/home/czhan182/scr4_rsteven1/chenjia_echo_project/2026 Multi-Modal Project/scripts/echo_infer_AD/results/echo_jhu_labels_llm.csv"
  accession_index: "/home/czhan182/scr4_rsteven1/chenjia_echo_project/2026 Multi-Modal Project/scripts/echo_infer_AD/results/accession_index.json"

# --- Model ---
model:
  backbone: "panecho"
  clip_len: 16
  freeze_backbone: true            # freeze initially, unfreeze after warmup
  unfreeze_after_epoch: 3          # unfreeze backbone after 3 epochs of head-only training
  hidden_dim: 256
  dropout: 0.3

# --- Label Settings ---
labels:
  mode: "binary"

# --- Video Preprocessing ---
video:
  num_frames: 16
  frame_size: 224
  min_frames_per_dicom: 4
  max_dicoms_per_study: 10         # reduced from 50 to limit class imbalance at clip level
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

# --- Training ---
training:
  seed: 42
  batch_size: 8
  num_workers: 4
  epochs: 30
  learning_rate: 5.0e-4            # head learning rate
  backbone_lr: 5.0e-6              # backbone learning rate (100x smaller)
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 3                 # match unfreeze_after_epoch
  focal_gamma: 2.0                 # focal loss focusing parameter
  val_split: 0.15
  test_split: 0.15
  early_stopping_patience: 10      # more patience since we track AUPRC
  mixed_precision: true

# --- Output ---
output:
  checkpoint_dir: "/home/czhan182/scr4_rsteven1/chenjia_echo_project/2026 Multi-Modal Project/scripts/echo_infer_AD/results/checkpoints"
  log_dir: "/home/czhan182/scr4_rsteven1/chenjia_echo_project/2026 Multi-Modal Project/scripts/echo_infer_AD/results/logs"

# --- SLURM / Rockfish ---
slurm:
  partition: "a100"
  account: "rsteven1_gpu"
  qos: "qos_gpu"
  gpus: 1
  cpus_per_task: 6
  mem: "48G"
  time: "12:00:00"